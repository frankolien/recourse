# Postgres for the Recourse backend indexer. Testnet demo only.
services:
  postgres:
    image: postgres:16-alpine
    container_name: recourse-postgres
    environment:
      POSTGRES_USER: recourse
      POSTGRES_PASSWORD: recourse
      POSTGRES_DB: recourse
    # Host port 5433 by default to avoid colliding with other local Postgres
    # instances on 5432. Override with RECOURSE_PG_PORT if needed.
    ports:
      - "${RECOURSE_PG_PORT:-5433}:5432"
    volumes:
      - recourse-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recourse"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  recourse-pgdata:
